<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in || Sign up from</title>
     <!-- font awesome icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css stylesheet -->
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="create_user" action="#">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>or use your email for registration</span>
                <div class="infield">
                    <input id="username" type="text" placeholder="Enter UserName" required/>
                    <label></label>
                </div>
                <div class="infield">
                    <input id="email" type="email" placeholder="Enter email" name="email" required/>
                    <label></label>
                </div>
                <div class="infield">
                    <input id="phone" type="tel" name="phone" placeholder="Enter phone number" pattern="[0-9]{10}" required>
                    <!-- <input type="phone_no" placeholder="Phone No" /> -->
                    <label></label>
                </div>
                <div class="infield">
                    <input type="password" minlength="8" placeholder="Create Password" required />
                    <label></label>
                </div>
                <div class="infield">
                    <input id="password" type="password" minlength="8" placeholder="Conform Password" required />
                    <label></label>
                </div>
                <button>Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form id="loginForm" action="#">
                <h1>Sign in</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>or use your account</span>
                <div class="infield">
                    <input id="login_email" type="email" placeholder="Email" name="email" required/>
                    <!-- <input id="username" type="text" placeholder="Enter UserName" required/> -->
                    <label></label>
                </div>
                <div class="infield">
                    <input id="login_password" type="password" placeholder="Password" required />
                    <label></label>
                </div>
                <a href="#" class="forgot">Forgot your password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>
        <div class="overlay-container" id="overlayCon">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button>Login</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <button>Register User</button>
                </div>
            </div>
            <button id="overlayBtn"></button>
        </div>
    </div>

    <!--<footer>
        <mark>See more on <a href="https://www.youtube.com/channel/UCHIkJZkap10qGFHq5ViIExg">Karacode</a></mark>
    </footer>-->
    
    <!-- js code -->
    <script src="script1.js">

    </script>

</body>
</html>
